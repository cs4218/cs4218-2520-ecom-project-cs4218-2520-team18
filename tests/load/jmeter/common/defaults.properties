# Shared defaults for all load profiles
protocol=http
host=127.0.0.1
port=6060
basePath=

# Runtime
rampUp=300
duration=1800
thinkTimeMinMs=1000
thinkTimeMaxMs=3000
thinkTimeRangeMs=2000

# Scenario thread split (A=public browse/search, B=user auth/orders, CD=admin/category)
scenarioAThreads=48
scenarioBThreads=16
scenarioCDThreads=8

# Input files
searchKeywordsCsv=tests/load/jmeter/data/search-keywords.csv
usersCsv=tests/load/jmeter/data/users.csv
adminsCsv=tests/load/jmeter/data/admins.csv

