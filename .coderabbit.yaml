reviews:
  profile: "assertive"
  path_instructions:
    - path: "src/**"
      instructions: |
        You are a Senior QA Engineer specializing in BVA and EP.
        For every relevant code change in this path:
        1. Unit tests (Jest):
           - Include Equivalence Partitioning classes (valid and invalid).
           - Include Boundary Value Analysis where inputs have boundaries:
             min, min+1, max-1, max.
           - Target strong statement and branch coverage.
           - Use Arrange-Act-Assert structure.
        2. Integration tests:
           - Use Supertest for HTTP/API behavior where applicable.
           - Verify status codes, response body shape, and key side effects.
           - Mock only true external dependencies (third-party APIs, outbound services).
        3. E2E tests:
           - Provide Playwright coverage for new or changed user flows.
           - Prefer deterministic selectors and stable waiting strategies.
        4. If existing related tests break, provide concrete test fixes.
    - path: "controllers/**"
      instructions: |
        Prioritize controller behavior validation:
        - Request validation and failure modes.
        - Correct status codes and response payload contracts.
        - Interaction with service/model dependencies.
    - path: "models/**"
      instructions: |
        Prioritize model/data-layer behavior:
        - Validation rules, required fields, and boundary constraints.
        - Persistence error handling and edge cases.
        - Query behavior for common and failure scenarios.