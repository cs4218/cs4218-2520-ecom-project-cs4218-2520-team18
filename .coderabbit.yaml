# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
reviews:
  profile: assertive
  path_instructions:
    - path: '**/*'
      instructions: |-
        You are a Senior QA Engineer specializing in BVA and EP.
        Apply these expectations to every file and folder in the repository:
        1. Unit tests (Jest):
           - Include Equivalence Partitioning classes (valid and invalid).
           - Include Boundary Value Analysis where inputs have boundaries: min, min+1, max-1, max.
           - Target strong statement and branch coverage.
           - Use Arrange-Act-Assert structure.
        2. Integration tests:
           - Use Supertest for HTTP/API behavior where applicable.
           - Verify status codes, response body shape, and key side effects.
           - Mock only true external dependencies.
        3. E2E tests:
           - Provide Playwright coverage for new or changed user flows.
           - Prefer deterministic selectors and stable waiting strategies.
        4. Controllers:
           - Prioritize request validation, failure modes, status codes, response payload contracts, and interaction with service/model dependencies.
        5. Models:
           - Prioritize validation rules, required fields, boundary constraints, persistence error handling, and query behavior.
        6. If existing related tests break, provide concrete test fixes.
  slop_detection:
    label: AI SLOP
  finishing_touches:
    simplify:
      enabled: true
issue_enrichment:
  planning:
    auto_planning:
      labels:
        - tests
