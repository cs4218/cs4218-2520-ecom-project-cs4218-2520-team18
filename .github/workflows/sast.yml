name: SAST with Semgrep

on:
  push:
    branches: [main, sherwyn-securitytests]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  semgrep:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Semgrep
        run: python3 -m pip install --upgrade semgrep

      - name: Run Semgrep scan
        id: semgrep
        continue-on-error: true
        run: >-
          semgrep
          --oss-only
          --config=p/security-audit
          --config=p/owasp-top-ten
          --config=p/cwe-top-25
          --exclude='*.test.js'
          --exclude='*.integration.test.js'
          --exclude='*.html'
          --exclude='package.json'
          --exclude='package-lock.json'
          --exclude='client/src/_site/**'
          --exclude='playwright-report/**'
          --exclude='coverage/**'
          --exclude='test-results/**'
          --exclude='zap-report.html'
          --exclude='zap-report.json'
          --sarif
          --output=semgrep.sarif
          . 2>/dev/null

      - name: Upload SARIF report to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('semgrep.sarif') != ''
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && hashFiles('semgrep.sarif') != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sarifData = JSON.parse(fs.readFileSync('semgrep.sarif', 'utf8'));
            const results = sarifData.runs[0].results || [];

            if (results.length === 0) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '✅ **Semgrep SAST scan passed!** No security issues found.'
              });
            } else {
              let comment = '⚠️ **Semgrep SAST scan found issues:**\n\n';
              results.forEach(result => {
                const rule = result.ruleId || 'Unknown';
                const message = result.message.text || 'No message';
                const location = result.locations[0];
                const file = location.physicalLocation.artifactLocation.uri;
                const line = location.physicalLocation.region.startLine;
                comment += `- **${rule}** at ${file}:${line}\n  ${message}\n\n`;
              });
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            }

      - name: Fail build when Semgrep finds issues
        if: steps.semgrep.outcome == 'failure'
        run: exit 1
