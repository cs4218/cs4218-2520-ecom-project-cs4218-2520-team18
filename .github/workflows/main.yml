name: Run Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Run Jest tests for frontend
        run: npm run test:frontend
        
      - name: Run Jest tests for backend
        run: npm run test:backend
        env: 
          BRAINTREE_MERCHANT_ID: "dummy_merchant"
          BRAINTREE_PUBLIC_KEY: "dummy_public"
          BRAINTREE_PRIVATE_KEY: "dummy_private"

      - name: Run integration tests for frontend
        run: npm run test:integration:frontend -- --coverage=false

      - name: Run integration tests for backend
        run: npm run test:integration:backend -- --coverage=false
        env:
          BRAINTREE_MERCHANT_ID: "dummy_merchant"
          BRAINTREE_PUBLIC_KEY: "dummy_public"
          BRAINTREE_PRIVATE_KEY: "dummy_private"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Debug environment
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "System info: $(uname -a)"

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BRAINTREE_MERCHANT_ID: ${{ secrets.BRAINTREE_MERCHANT_ID }}
          BRAINTREE_PUBLIC_KEY: ${{ secrets.BRAINTREE_PUBLIC_KEY }}
          BRAINTREE_PRIVATE_KEY: ${{ secrets.BRAINTREE_PRIVATE_KEY }}
          NODE_OPTIONS: "--trace-warnings"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30